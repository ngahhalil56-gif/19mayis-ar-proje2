<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Atatürk AR Deneyimi</title>
    
    <!-- A-Frame ve MindAR Kütüphaneleri -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      
      /* MindAR'ın kendi yükleme ekranlarını gizliyoruz (Kendi tasarımımızı kullanacağız) */
      .mindar-ui-loading { display: none !important; }
      .mindar-ui-overlay { display: none !important; }

      /* BİLGİ KUTUSU */
      #info-box {
        position: fixed; top: 10px; right: 10px; width: 180px;
        background: rgba(0, 0, 0, 0.7); color: white; padding: 10px;
        border-radius: 8px; font-size: 11px; z-index: 10000;
        backdrop-filter: blur(5px); border: 1px solid rgba(255, 255, 255, 0.2);
      }

      /* BAŞLAT EKRANI */
      #start-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle, #2c3e50 0%, #000000 100%); z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        color: white; text-align: center;
      }
      
      #start-button {
        padding: 15px 45px; font-size: 18px; font-weight: bold;
        background: #e74c3c; color: white; border: none; border-radius: 30px;
        cursor: pointer; margin-top: 20px; 
        box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
        transition: transform 0.2s;
      }
      #start-button:active { transform: scale(0.95); }

      /* TARAMA REHBERİ (Görseli algılaması için yardımcı çerçeve) */
      #scanning-overlay {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; z-index: 999;
        background: url('https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.0/examples/image-tracking/assets/card-example/softmind/overlay.png') no-repeat center center;
        background-size: 70%; opacity: 0.4;
      }
    </style>
  </head>
  <body>

    <div id="info-box">
      <strong>Atatürk AR v1.0</strong><br>
      - 3D Model: Atatürk.glb<br>
      - Klasör: /Atatürk/
    </div>

    <div id="start-screen">
      <h2>Atatürk AR Deneyimi</h2>
      <p>Kamerayı kullanmak ve deneyimi başlatmak için butona dokunun</p>
      <button id="start-button">DENEYİMİ BAŞLAT</button>
    </div>

    <div id="scanning-overlay"></div>

    <a-scene 
      mindar-image="imageTargetSrc: ./Atatürk/targets.mind; uiScanning: no; uiLoading: no;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <!-- 3D Modelinizi burada tanımlıyoruz -->
        <a-asset-item id="ataturkModel" src="./Atatürk/Atatürk.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Hedef Görsel Algılandığında Görünecek Kısım -->
      <a-entity id="mytarget" mindar-image-target="targetIndex: 0">
        
        <!-- 3D Model: Atatürk.glb -->
        <!-- scale: model çok küçükse 0.5 0.5 0.5 gibi değerlerle büyütebilirsin -->
        <a-gltf-model 
          id="ataturk-3d"
          src="#ataturkModel" 
          position="0 0 0" 
          rotation="0 0 0" 
          scale="0.2 0.2 0.2">
        </a-gltf-model>

      </a-entity>
    </a-scene>

    <script>
      const startScreen = document.getElementById('start-screen');
      const startButton = document.getElementById('start-button');
      const scanningOverlay = document.getElementById('scanning-overlay');
      const target = document.getElementById('mytarget');

      // Başlat Butonuna Tıklandığında
      startButton.addEventListener('click', () => {
        startScreen.style.display = 'none';
        scanningOverlay.style.display = 'block'; // Tarama rehberini göster
      });

      // Görsel Bulunduğunda
      target.addEventListener("targetFound", () => {
        console.log("Hedef bulundu!");
        scanningOverlay.style.display = 'none'; // Hedef bulununca rehberi gizle
      });

      // Görsel Kaybedildiğinde
      target.addEventListener("targetLost", () => {
        console.log("Hedef kaybedildi!");
        scanningOverlay.style.display = 'block'; // Hedef kaybolunca rehberi tekrar göster
      });
    </script>
  </body>
</html>
